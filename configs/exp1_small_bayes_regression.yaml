experiment_name: exp1_small_bayes_regression
device:
  prefer_gpu: true
  allow_cpu_fallback: true
seeds:
- 0
- 1
- 2
- 3
- 4
n: 100
d: 20
active_count: 4
noise_sigma: 0.5
priors:
- name: laplace
  scale: 0.5
  smooth_delta: 1.0e-05
- name: student_t
  df: 3.0
  scale: 0.5
- name: gaussian
  scale: 0.5
- name: horseshoe_like
  global_scale: 0.5
  enabled: false
  role: stress_test_only
map_optimisation:
  max_steps: 5000
  lr: 0.01
  tolerance: 1.0e-08
  use_lbfgs: true
laplace:
  hessian_jitter: 1.0e-06
  max_condition_number_warning: 1.0e10
  allow_pseudo_inverse: true
r_grid:
  type: logspace
  min_exp: -6
  max_exp: -0.5
  num: 40
primary_radius_window:
  use_smallest_k: 8
